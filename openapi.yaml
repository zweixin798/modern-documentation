openapi: 3.0.3
info:
  title: AI Core API
  version: 0.1.0
  description: |
    Mock OpenAPI spec for AI Core Docs demo.

servers:
  - url: https://api.example.com
    description: Production (mock)
  - url: https://staging-api.example.com
    description: Staging (mock)

tags:
  - name: Chat
    description: Large model chat and tool calls

paths:
  /v1/chat/completions:
    post:
      tags: [Chat]
      summary: Create a chat completion
      operationId: createChatCompletion
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
            examples:
              basic:
                summary: Basic chat request
                value:
                  model: gpt-4o-mini
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Summarize RAG in 2 sentences.
                  temperature: 0.2
                  max_tokens: 200
              tool_call:
                summary: Tool calling (function calling) request
                value:
                  model: gpt-4o
                  messages:
                    - role: user
                      content: What's the weather in Shanghai and suggest an outfit.
                  tools:
                    - type: function
                      function:
                        name: get_weather
                        description: Get current weather by city name.
                        parameters:
                          type: object
                          properties:
                            city:
                              type: string
                              description: City name, e.g. Shanghai
                          required: [city]
                  tool_choice: auto
                  temperature: 0.3
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
              examples:
                assistant_text:
                  summary: Assistant returns text
                  value:
                    id: chatcmpl_demo_001
                    object: chat.completion
                    created: 1710000000
                    model: gpt-4o-mini
                    choices:
                      - index: 0
                        finish_reason: stop
                        message:
                          role: assistant
                          content: RAG (Retrieval-Augmented Generation) retrieves relevant knowledge from external sources and injects it into the model context. This reduces hallucinations and improves factual grounding for domain-specific answers.
                    usage:
                      prompt_tokens: 27
                      completion_tokens: 46
                      total_tokens: 73
                tool_calls:
                  summary: Assistant triggers a function call
                  value:
                    id: chatcmpl_demo_002
                    object: chat.completion
                    created: 1710000001
                    model: gpt-4o
                    choices:
                      - index: 0
                        finish_reason: tool_calls
                        message:
                          role: assistant
                          content: null
                          tool_calls:
                            - id: call_abc123
                              type: function
                              function:
                                name: get_weather
                                arguments: "{\"city\":\"Shanghai\"}"
                    usage:
                      prompt_tokens: 41
                      completion_tokens: 18
                      total_tokens: 59
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bad_request:
                  value:
                    error:
                      type: invalid_request_error
                      message: "model is required"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    error:
                      type: authentication_error
                      message: "Missing or invalid API key"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API_KEY

  schemas:
    ChatCompletionRequest:
      type: object
      additionalProperties: false
      properties:
        model:
          type: string
          description: Model ID.
          example: gpt-4o-mini
        messages:
          type: array
          description: Chat messages.
          items:
            $ref: "#/components/schemas/ChatMessage"
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          default: 1
        top_p:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 1
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 512
        tools:
          type: array
          description: Optional tools for function calling.
          items:
            $ref: "#/components/schemas/Tool"
        tool_choice:
          description: |
            Controls tool usage. Use "auto" or specify a single tool.
          oneOf:
            - type: string
              enum: [auto, none]
            - $ref: "#/components/schemas/ToolChoice"
      required: [model, messages]

    ChatMessage:
      type: object
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          nullable: true
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentPart"
        name:
          type: string
          description: Optional name for the message author.
        tool_call_id:
          type: string
          description: For tool role messages, references a tool call id.
      required: [role, content]

    ContentPart:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
      required: [type, text]

    Tool:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [function]
        function:
          $ref: "#/components/schemas/FunctionTool"
      required: [type, function]

    FunctionTool:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Function name.
        description:
          type: string
        parameters:
          type: object
          description: JSON Schema for function parameters.
          additionalProperties: true
      required: [name, parameters]

    ToolChoice:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
          required: [name]
      required: [type, function]

    ChatCompletionResponse:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatChoice"
        usage:
          $ref: "#/components/schemas/Usage"
      required: [id, object, created, model, choices]

    ChatChoice:
      type: object
      additionalProperties: false
      properties:
        index:
          type: integer
        finish_reason:
          type: string
          enum: [stop, length, tool_calls]
        message:
          $ref: "#/components/schemas/AssistantMessage"
      required: [index, finish_reason, message]

    AssistantMessage:
      type: object
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [assistant]
        content:
          type: string
          nullable: true
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
      required: [role, content]

    ToolCall:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
            arguments:
              type: string
              description: JSON string of arguments.
          required: [name, arguments]
      required: [id, type, function]

    Usage:
      type: object
      additionalProperties: false
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
      required: [prompt_tokens, completion_tokens, total_tokens]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
            message:
              type: string
          required: [type, message]
      required: [error]
